    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            outline: none;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffe6fa 0%, #ffdfdf 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; color: #5a4a4a;
            overflow: hidden;
        }

    .container {
    background: transparent; /* Убираем белый фон */
    padding: 20px;
    border-radius: 0;
    box-shadow: none; /* Убираем тень */
    text-align: center;
    max-width: 95%;
    width: 400px;
    position: relative;
    z-index: 10; /* Чтобы контент был выше сердечек */
}

/* Добавим легкое свечение тексту, чтобы он всегда читался */
h1, h2, p {
    color: #d85a7d;
    text-shadow: 1px 1px 10px rgba(255, 255, 255, 0.8), 
                 -1px -1px 10px rgba(255, 255, 255, 0.8);
}

.instruction {
    color: #a18a8a;
    text-shadow: 1px 1px 5px rgba(255, 255, 255, 0.9);
}


        /* Прогресс-бар */
        .progress-container {
            width: 100%; background-color: #f0f0f0;
            height: 6px; border-radius: 10px;
            margin-bottom: 20px; overflow: hidden;
        }
        .progress-bar {
            height: 100%; background: linear-gradient(90deg, #ff99ac, #d85a7d);
            width: 0%; transition: width 0.4s ease;
        }

        h1 { font-size: 26px; color: #d85a7d; margin-bottom: 10px; }
        h2 { font-size: 22px; color: #d85a7d; margin-top: 10px; margin-bottom: 5px; }
        p { line-height: 1.5; font-size: 15px; }
        .instruction { font-size: 13px; color: #a18a8a; margin-bottom: 15px; font-style: italic; }

        .gif-container {
            height: 200px; display: flex; justify-content: center;
            align-items: center; margin-bottom: 20px;
        }
        .gif-container img {
            max-width: 100%; max-height: 200px;
            object-fit: contain; border-radius: 20px;
        }

        .options { display: grid; grid-template-columns: 1fr; gap: 10px; }

        .option-btn, .start-btn, #next-btn {
            background-color: #ffffff; color: #ff758f;
            border: 2px solid #ff99ac; padding: 15px;
            font-size: 16px; border-radius: 20px;
            cursor: pointer; transition: all 0.2s ease;
            font-weight: bold;
        }

        .option-btn.selected { background-color: #ff99ac; color: white; border-color: #ff758f; }

        .start-btn, #next-btn {
            background-color: #d85a7d;
            color: white; border: none;
            width: 100%; margin-top: 20px;
        }

        .start-btn:active, #next-btn:active { transform: scale(0.95); }

        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(5px); }
        }

        .fade-in { animation: fadeIn 0.6s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .typing-text::after { content: "|"; animation: blink 0.7s infinite; color: #d85a7d; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }


  body::before {
    content: "❤️";
    position: random;
    top: -10%;
    left: 10%;
    font-size: 20px;
    opacity: 0.2;
    animation: drift 5s infinite linear;
}

body::after {
    content: "💖";
    position: random;
    bottom: -10%;
    right: 15%;
    font-size: 25px;
    opacity: 0.2;
    animation: drift 12s infinite linear reverse;
}

@keyframes drift {
    from { transform: translateY(0) rotate(0deg); }
    to { transform: translateY(110vh) rotate(360deg); }
}
#next-btn, .start-btn {
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(216, 90, 125, 0.4); }
    70% { box-shadow: 0 0 0 10px rgba(216, 90, 125, 0); }
    100% { box-shadow: 0 0 0 0 rgba(216, 90, 125, 0); }
}
.heart-bg {
    position: fixed;
    top: -50px;
    font-size: 20px;
    opacity: 0.3;
    z-index: -1; /* Чтобы они были ЗА карточкой */
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
    }
}
/* Стили для заряжающегося сердца */
.charge-heart {
    font-size: 60px;
    cursor: pointer;
    display: inline-block;
    margin: 20px 0;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    filter: drop-shadow(0 0 10px rgba(216, 90, 125, 0.5));
    animation: pulseHeart 1.5s infinite;
    -webkit-tap-highlight-color: transparent;
}

/* Пульсация, пока она не начала кликать */
@keyframes pulseHeart {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); filter: drop-shadow(0 0 20px rgba(216, 90, 125, 0.8)); }
    100% { transform: scale(1); }
}

#heart-hint {
    color: #ff99ac;
    font-size: 16px;
    font-weight: bold;
    height: 24px; /* Чтобы текст не прыгал, когда меняется */
    text-shadow: 1px 1px 5px rgba(255, 255, 255, 0.9);
}

<script>
    function createHearts() {
        const icons = ['❤️', '💖', '💕', '🌸','❤️‍🔥','💚'];
        for (let i = 0; i < 20; i++) {
            setTimeout(() => {
                const heart = document.createElement('div');
                heart.className = 'heart-bg';
                heart.innerText = icons[Math.floor(Math.random() * icons.length)];
                
                // Случайная позиция по горизонтали (0-100%)
                heart.style.left = Math.random() * 100 + 'vw';
                
                // Случайный размер (15-30px)
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
                
                // Случайная длительность полета (5-10 секунд)
                const duration = Math.random() * 5 + 5;
                heart.style.animationDuration = duration + 's';
                
                document.body.appendChild(heart);
                
                // Удаляем сердечко после пролета, чтобы не копились
                setTimeout(() => heart.remove(), duration * 1000);
            }, i * 500); // Появляются по очереди
        }
    }

    // Запускаем создание сердечек каждые 3 секунды бесконечно
    setInterval(createHearts, 3000);
    createHearts(); // Первый запуск сразу
</script>

        // 1. НАЧАЛЬНЫЙ ЭКРАН С "ЗАРЯДКОЙ СЕРДЦА"
function showStartScreen() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = `
        <div class="fade-in">
            <h1>Добро пожаловать моя любимка</h1>

            <div id="charge-heart" class="charge-heart" onclick="chargeHeart()">❤️</div>
        </div>
    `;
}

// Логика зарядки на 25 тапов
let heartClicks = 0;
const MAX_CLICKS = 25;

function chargeHeart() {
    heartClicks++;
    const heart = document.getElementById('charge-heart');
    const hint = document.getElementById('heart-hint');
    const remaining = MAX_CLICKS - heartClicks;
    
    // Легкая вибрация при каждом тапе
    if (navigator.vibrate) navigator.vibrate(30);

    // Динамический текст, который меняется в зависимости от прогресса
    if (remaining > 20) {
        hint.innerText = `Осталось: ${remaining} 💓`;
    } else if (remaining > 10) {
        hint.innerText = `Так держать! Ещё ${remaining} 💗`;
    } else if (remaining > 5) {
        hint.innerText = `Уже горячо! Осталось ${remaining} 💖`;
    } else if (remaining > 1) {
        hint.innerText = `Почти взрыв! Ещё ${remaining} 🔥`;
    } else if (remaining === 1) {
        hint.innerText = `Последний тап!!! 💚`;
    }

    // Сердце растет плавно (прибавляем по 0.08 к размеру за тап)
    // К концу оно будет примерно в 2.5 раза больше изначального
    heart.style.animation = "none"; 
    heart.style.transform = `scale(${1 + heartClicks * 0.07})`;

    // Когда дошли до 25
    if (heartClicks >= MAX_CLICKS) {
        hint.innerText = "Заряжено на 100%! ✨";
        heart.style.pointerEvents = 'none'; // Блокируем лишние клики
        
        
        // Победная вибрация
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        
        // Салют
        if (typeof confetti === 'function') {
            confetti({
                particleCount: 80,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff99ac', '#d85a7d', '#ff0000']
            });
        }
        
        // Переход к квизу
        setTimeout(() => {
            startQuiz();
        }, 2000); // Даем секунду полюбоваться взрывом
    }
}

        function startQuiz() {
            sendToTelegram(" Она !");
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentQuestionIndex];
            selectedAnswers.clear();

            const progress = (currentQuestionIndex / questions.length) * 100;
            const container = document.getElementById('quiz-container');

            container.innerHTML = `
                <div class="fade-in">
                    <div class="progress-container"><div class="progress-bar" style="width: ${progress}%"></div></div>
                    <h2>${q.text}</h2>
                    <p class="instruction">${q.instruction}</p>
                    <div class="gif-container">
                        <img src="${q.gif}" alt="media" onerror="this.src='https://media.tenor.com/a9A1fHjE76oAAAAC/peach-goma.gif'">
                    </div>
                    <div class="options" id="options-grid"></div>
                    <button id="next-btn" onclick="checkAndNext()">Далее ➔</button>
                </div>
            `;

            const grid = document.getElementById('options-grid');
            q.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => toggleOption(btn, index);
                grid.appendChild(btn);
            });
        }

function toggleOption(btn, index) {
    const q = questions[currentQuestionIndex];
    if (q.type === "multiple") {
        if (selectedAnswers.has(index)) {
            selectedAnswers.delete(index);
            btn.classList.remove('selected');
        } else {
            selectedAnswers.add(index);
            btn.classList.add('selected');
            if (navigator.vibrate) navigator.vibrate(40);
        }
    } else {
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        selectedAnswers.clear();
        selectedAnswers.add(index);
        btn.classList.add('selected');
        if (navigator.vibrate) navigator.vibrate(40);
    }
}

function checkAndNext() {
    const q = questions[currentQuestionIndex];
    const nextBtn = document.getElementById('next-btn');
    const selectedBtn = document.querySelector('.option-btn.selected');
    
    let isCorrect = false;
    let reportMessage = "";

    if (q.type === "multiple") {
        if (selectedAnswers.size === q.options.length) {
            isCorrect = true;
            // Собираем все ответы в одну строку для отчета
            const answersText = Array.from(selectedAnswers).map(i => q.options[i]).join(", ");
            reportMessage = `✅ Прошла 'Все варианты' в вопросе: "${q.text}". \nВыбрано: ${answersText}`;
        }
    } else if (q.type === "single" || q.type === "correct") {
        if (selectedAnswers.size === 1) {
            if (q.type === "correct" && selectedBtn.innerText !== q.correctAnswer) {
                isCorrect = false; // Не пускаем, если ответ неверный
            } else {
                isCorrect = true;
                reportMessage = `📩 Ответ на вопрос "${q.text}": ${selectedBtn.innerText}`;
            }
        }
    }

    if (isCorrect) {
        if (reportMessage) sendToTelegram(reportMessage); // Отправляем отчет в ТГ
        
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            renderQuestion();
        } else {
            showFinalScreen();
        }
    } else {
        // Ошибка (тряска и вибрация)
        nextBtn.classList.remove('shake');
        void nextBtn.offsetWidth; 
        nextBtn.classList.add('shake');
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        
        if (q.type === "multiple" || q.type === "correct") {
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            selectedAnswers.clear();
        }
    }
}


        function sendToTelegram(message) {
